<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Вход через Google</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8f9fa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,.12);
      padding: 32px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .logo { font-size: 22px; font-weight: 500; margin-bottom: 8px; }
    .logo span { color: #4285F4; }
    .logo span:nth-child(2) { color: #EA4335; }
    .logo span:nth-child(3) { color: #FBBC05; }
    .logo span:nth-child(4) { color: #4285F4; }
    .logo span:nth-child(5) { color: #34A853; }
    .logo span:nth-child(6) { color: #EA4335; }
    p { color: #5f6368; font-size: 14px; margin: 16px 0 24px; }
    .account {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border: 1px solid #dadce0;
      border-radius: 8px;
      cursor: pointer;
      text-align: left;
      transition: background .15s;
    }
    .account:hover { background: #f1f3f4; }
    .avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: #7C3AED; color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-weight: 600; font-size: 16px;
    }
    .info .name { font-size: 14px; font-weight: 500; color: #202124; }
    .info .email { font-size: 12px; color: #5f6368; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span>
    </div>
    <p>Выберите аккаунт для входа в IT Team</p>
    <div class="account" id="selectAccount">
      <div class="avatar">G</div>
      <div class="info">
        <div class="name">Google User</div>
        <div class="email">user@gmail.com</div>
      </div>
    </div>
  </div>
  <script>
    const googleUser = {
      name: 'Google User',
      email: 'user@gmail.com',
      provider: 'google',
    }

    document.getElementById('selectAccount').addEventListener('click', () => {
      if (window.opener) {
        window.opener.postMessage(
          { type: 'google-auth-success', user: googleUser },
          window.location.origin
        )
      }
      setTimeout(() => window.close(), 200)
    })
  </script>
</body>
</html>
